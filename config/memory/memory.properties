# 记忆系统总开关。
enabled=true

# 原型本地数据目录。相对路径会以当前项目目录为基准。
dataRoot=data/memory

# 角色包根目录。每个 maidId 对应一个子目录，里面放稳定人设、人格参数、心情状态、
# 关系状态和角色长期参考记忆。
characterRoot=data/characters

# 原型身份标识；接 Forge 后改成女仆 UUID / 玩家 UUID / 存档 ID。
maidId=prototype-jiuhu
ownerId=prototype-owner
worldId=prototype-world

# 每轮 prompt 最多注入多少条相关记忆和用户画像。
promptMemoryLimit=3
promptProfileLimit=5

# query_memory 工具默认返回条数。
retrievalLimit=5
queryMemoryToolEnabled=true
