[[models]]
model_identifier = "deepseek-ai/DeepSeek-V4-Flash"
name = "siliconflow-deepseek-v4-flash"
api_provider = "SiliconFlow"
price_in = 2
price_out = 3

[models.extra_params]
enable_thinking = false

[[models]]
model_identifier = "deepseek-ai/DeepSeek-V3.2-Exp"
name = "siliconflow-deepseek-v3.2-think"
api_provider = "SiliconFlow"
price_in = 2
price_out = 3

[models.extra_params]
enable_thinking = true

[[models]]
model_identifier = "deepseek-ai/DeepSeek-R1"
name = "siliconflow-deepseek-r1"
api_provider = "SiliconFlow"
price_in = 4
price_out = 16


[[models]]
model_identifier = "Pro/zai-org/GLM-5.1"
