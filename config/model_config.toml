[[models]]
model_identifier = "Qwen/Qwen3-VL-30B-A3B-Instruct"
name = "qwen3-vl-30"
api_provider = "SiliconFlow"
price_in = 4.13
price_out = 4.13

[[models]]
model_identifier = "FunAudioLLM/SenseVoiceSmall"
name = "sensevoice-small"
api_provider = "SiliconFlow"
price_in = 0
price_out = 0

[[models]]
model_identifier = "BAAI/bge-m3"
name = "bge-m3"
api_provider = "SiliconFlow"
price_in = 0
price_out = 0
[model_task_config.utils] # 在麦麦的一些组件中使用的模型，例如表情包模块，取名模块，关系模块，麦麦的情绪变化等，是麦麦必须的模型
model_list = ["siliconflow-deepseek-v4-flash"] # 使用的模型列表，每个子项对应上面的模型名称(name)
temperature = 0.2                        # 模型温度，新V3建议0.1-0.3
max_tokens = 4096                         # 最大输出token数
slow_threshold = 15                     # 慢请求阈值（秒），模型等待回复时间超过此值会输出警告日志
selection_strategy = "random"           # 模型选择策略：balance（负载均衡）或 random（随机选择）

[model_task_config.tool_use] #功能模型，需要使用支持工具调用的模型，请使用较快的小模型（调用量较大）
model_list = ["siliconflow-glm-5.1"]
temperature = 0.7
max_tokens = 1024
slow_threshold = 10
selection_strategy = "random"           # 模型选择策略：balance（负载均衡）或 random（随机选择）

[model_task_config.replyer] # 首要回复模型，还用于表达方式学习
model_list = ["siliconflow-deepseek-v4-flash"]
temperature = 0.3                        # 模型温度，新V3建议0.1-0.3
max_tokens = 2048
slow_threshold = 25
selection_strategy = "random"           # 模型选择策略：balance（负载均衡）或 random（随机选择）

[model_task_config.planner] #决策：负责决定麦麦该什么时候回复的模型
model_list = ["siliconflow-glm-5.1"]
temperature = 0.3
max_tokens = 800
slow_threshold = 12
selection_strategy = "random"           # 模型选择策略：balance（负载均衡）或 random（随机选择）

[model_task_config.vlm] # 图像识别模型
model_list = ["qwen3-vl-30"]
max_tokens = 256
slow_threshold = 15
selection_strategy = "random"           # 模型选择策略：balance（负载均衡）或 random（随机选择）

[model_task_config.voice] # 语音识别模型
model_list = ["sensevoice-small"]
slow_threshold = 12
selection_strategy = "random"           # 模型选择策略：balance（负载均衡）或 random（随机选择）

# 嵌入模型

[model_task_config.embedding]
model_list = ["bge-m3"]
slow_threshold = 5
selection_strategy = "random"           # 模型选择策略：balance（负载均衡）或 random（随机选择）

# ------------LPMM知识库模型------------

[model_task_config.lpmm_entity_extract] # 实体提取模型
model_list = ["siliconflow-deepseek-v4-flash"]
temperature = 0.2
max_tokens = 800
slow_threshold = 20
selection_strategy = "random"           # 模型选择策略：balance（负载均衡）或 random（随机选择）

[model_task_config.lpmm_rdf_build] # RDF构建模型
model_list = ["siliconflow-deepseek-v4-flash"]
temperature = 0.2
max_tokens = 800
slow_threshold = 20
selection_strategy = "random"           # 模型选择策略：balance（负载均衡）或 random（随机选择）
